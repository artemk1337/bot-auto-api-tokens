services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      CONFIG_PATH: /app/config.json
    volumes:
      - ${BOT_CONFIG:-./configs/gpt-oss-20b.json}:/app/config.json:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        model="$$(awk '/"ollama"[[:space:]]*:/ { in_ollama = 1 } in_ollama && /"model"[[:space:]]*:/ { line = $$0; sub(/^.*"model"[[:space:]]*:[[:space:]]*"/, "", line); sub(/".*$$/, "", line); print line; exit }' "$$CONFIG_PATH")"
        if [ -z "$$model" ]; then
          echo "ollama.model is required in $$CONFIG_PATH" >&2
          exit 1
        fi
        ollama pull "$$model"
    restart: "no"

  bot:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ${BOT_CONFIG:-./configs/gpt-oss-20b.json}:/app/config.json:ro
      - ./docs:/app/docs:ro
    command: ["-config", "/app/config.json", "-queue-size", "${QUEUE_SIZE:-100}"]

volumes:
  ollama-data:
