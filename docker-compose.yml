services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      CONFIG_PATH: /app/config.json
    volumes:
      - ${BOT_CONFIG:-./config.example.json}:/app/config.json:ro
      - ./scripts/ollama-pull-from-config.sh:/scripts/ollama-pull-from-config.sh:ro
    entrypoint: ["/bin/sh", "/scripts/ollama-pull-from-config.sh"]
    restart: "no"

  bot:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ${BOT_CONFIG:-./config.example.json}:/app/config.json:ro
      - ./docs:/app/docs:ro
    command: ["-config", "/app/config.json", "-queue-size", "100"]

volumes:
  ollama-data:
